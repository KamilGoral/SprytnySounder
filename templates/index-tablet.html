<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Przyciski dźwiękowe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .button {
      flex: 1;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #388e3c;
    }

    /* Przyciski 1 i 2 – poziomy układ, większy tekst */
    .horizontal-content {
      display: flex;
      align-items: center;
      gap: 0.5em;;
      font-size: 2em;
    }

    .horizontal-content i {
      font-size: 2.2em;
    }

    /* Przyciski 3 i 4 – pionowy układ */
    .vertical-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 1.2em;
    }

    .vertical-content i {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .last-section {
      display: flex;
      gap: 10px;
      padding: 10px;
      flex: 1;
    }

    .last-section .button {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="section">
      <button class="button" onclick="playSound('meat-worker.mp3')">
        <div class="horizontal-content">
          <i class="fas fa-drumstick-bite"></i>
          <span>Nowa osoba</span>
        </div>
      </button>
    </div>
    <div class="section">
      <button class="button" onclick="playSound('new-delivery.mp3')">
        <div class="horizontal-content">
          <i class="fas fa-box"></i>
          <span>Dostawa</span>
        </div>
      </button>
    </div>
    <div class="last-section">
      <button class="button" onclick="playSound('donuts-bielska.mp3')">
        <div class="vertical-content">
          <i class="fas fa-birthday-cake"></i>
          <span>Cukiernica</span>
        </div>
      </button>
      <button class="button" onclick="playSound('thief.mp3')">
        <div class="vertical-content">
          <i class="fas fa-user-secret"></i>
          <span>Złodziej</span>
        </div>
      </button>
    </div>
    <div class="last-section">
      <button class="button" onclick="playSound('recyklomat-oproznij.mp3')">
        <div class="vertical-content">
          <i class="fas fa-recycle"></i>
          <span>Recyklomat<br>opróżnij</span>
        </div>
      </button>
      <button class="button" onclick="playSound('recyklomat-pomoc.mp3')">
        <div class="vertical-content">
          <i class="fas fa-circle-question"></i>
          <span>Recyklomat<br>pomoc</span>
        </div>
      </button>
    </div>
  </div>

  <script>
    async function playSound(filename) {
      try {
        const response = await fetch('http://192.168.133.101:8989/play-defined-sound', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename })
        });

        if (!response.ok) {
          const error = await response.json();
          if (response.status === 423) {
            alert("🔇 System wyciszony: " + error.error);
          } else {
            alert("Błąd: " + error.error);
          }
        }
      } catch (e) {
        alert("Błąd połączenia z serwerem.");
      }
    }
  </script>
</body>
</html>
